server:
  port: 8080   # Single entry point — the only port exposed to the frontend
  address: 0.0.0.0
spring:
  application:
    name: gateway-service

  cloud:
    gateway:

      # ── Centralized CORS ──────────────────────────────────────────────────
      # CORS is configured here only. Downstream services have CORS disabled.
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins:
              - "http://localhost:3000"   # Vite dev server
              - "http://localhost:5173"   # Vite alternative port
              - "http://localhost:8081"   # Expo web dev server (default Metro port)
              - "http://localhost:19006"  # Expo web dev server (legacy default port)
            allowed-methods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowed-headers: "*"
            allow-credentials: true
            max-age: 3600

      # ── Route table ───────────────────────────────────────────────────────
      # Order matters for overlapping patterns — more specific paths first.
      routes:

        # auth-service  (Spring MVC, port 8081)
        # Handles: auth flows, vendor routes, and /api/customer/profile (profile lives in auth-service DB).
        # Listed BEFORE customer-service so the more-specific profile path is matched here first.
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**, /api/vendors/**, /api/customer/profile

        # customer-service  (Spring MVC, port 8085)
        # ONE route — catches all remaining /api/customer/** traffic (addresses, favourites, location).
        - id: customer-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/customer/**

        # vendor-service  (Spring MVC, port 8082)
        # Handles: GET /api/vendor/me  and  GET /api/vendor/kitchen
        - id: vendor-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/vendor/**

        # vendor-service  (Spring MVC, port 8082) — public kitchen discovery (SRS M3)
        # Handles: GET /api/kitchens, GET /api/kitchens/{id}, GET /api/search
        - id: vendor-service-kitchens
          uri: http://localhost:8082
          predicates:
            - Path=/api/kitchens, /api/kitchens/**, /api/search

        # order-service  (Spring MVC, port 8083)
        # Handles: dashboard summary, recent orders, orders list, order status update
        - id: order-service-dashboard
          uri: http://localhost:8083
          predicates:
            - Path=/api/dashboard/**

        - id: order-service-orders
          uri: http://localhost:8083
          predicates:
            - Path=/api/orders/**

        # meal-plan-service  (Spring MVC, port 8084)
        # Handles: meal plans CRUD, day menus, meal types catalog, menu options
        - id: meal-plan-service-plans
          uri: http://localhost:8084
          predicates:
            - Path=/api/meal-plans/**

        - id: meal-plan-service-types
          uri: http://localhost:8084
          predicates:
            - Path=/api/mealTypes/**

        - id: meal-plan-service-options
          uri: http://localhost:8084
          predicates:
            - Path=/api/menu-options/**

        - id: meal-plan-service-addons
          uri: http://localhost:8084
          predicates:
            - Path=/api/addOns

# ── JWT ─────────────────────────────────────────────────────────────────────
# Must be identical to the secret used by auth-service and vendor-service so
# the gateway can validate tokens without a network round-trip.
jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.thalicloud: DEBUG
